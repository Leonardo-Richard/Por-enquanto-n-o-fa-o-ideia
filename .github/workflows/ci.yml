name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portal_nf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portal_nf_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portal_nf_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Apply SQL migrations
        run: |
          for f in db/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"; done

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e-ler-smoke:
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portal_nf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portal_nf_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portal_nf_test
      BETTER_AUTH_SECRET: "012345678901234567890123456789ab"
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      PLAYWRIGHT_LER_SMOKE: "1"
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Apply SQL migrations
        run: |
          for f in db/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"; done

      - name: Build web
        run: pnpm --filter web build

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: pnpm exec playwright install chromium --with-deps

      - name: Start Next.js and run LER smoke
        working-directory: apps/web
        run: |
          pnpm start -- -p 3000 &
          NEXT_PID=$!
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:3000/" >/dev/null; then
              echo "Next.js is up"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Timeout waiting for Next.js"
              kill $NEXT_PID || true
              exit 1
            fi
            sleep 2
          done
          pnpm exec playwright test e2e/ler-smoke.spec.ts
          kill $NEXT_PID || true
