openapi: 3.0.3
info:
  title: Portal ADN — API pública v1 (extracto)
  version: 0.1.0
  description: |
    Rotas sob sessão Better Auth. Prefixo base:
    `/api/v1/organizations/{organizationId}/monitored-companies/{companyId}/adn`
servers:
  - url: /
paths:
  /api/v1/organizations/{organizationId}/monitored-companies/{companyId}/adn/sync:
    get:
      summary: Último job + resumo (polling)
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - $ref: "#/components/parameters/companyId"
      responses:
        "200":
          description: OK
        "401": { description: Sem sessão }
        "403": { description: Sem membership ou sem acesso à empresa }
        "404": { description: Org sem ADN ou recurso inexistente (FR45) }
    post:
      summary: Enfileirar sincronização manual (admin org)
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - $ref: "#/components/parameters/companyId"
        - name: Idempotency-Key
          in: header
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                issuedFrom: { type: string, format: date, example: "2026-01-01" }
                issuedTo: { type: string, format: date, example: "2026-01-31" }
      responses:
        "202":
          description: Accepted — job enfileirado ou idempotente
          content:
            application/json:
              schema:
                type: object
                required: [job]
                properties:
                  job:
                    type: object
                    required: [id, status]
                    properties:
                      id: { type: string, format: uuid }
                      status: { type: string }
        "400": { description: Corpo inválido (*strict*) }
        "403": { description: Sem papel admin na org ou superadmin sem admin }
        "404": { description: FR45 / empresa inexistente }
  /api/v1/organizations/{organizationId}/monitored-companies/{companyId}/adn/artifacts:
    get:
      summary: Listar artefactos (sem storage_object_key)
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - $ref: "#/components/parameters/companyId"
        - name: issuedFrom
          in: query
          schema: { type: string }
        - name: issuedTo
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200": { description: OK }
        "404": { description: FR45 }
  /api/v1/organizations/{organizationId}/monitored-companies/{companyId}/adn/artifacts/{artifactId}/download:
    get:
      summary: URL assinada JSON (downloadUrl + expiresAt)
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - $ref: "#/components/parameters/companyId"
        - name: artifactId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: JSON com downloadUrl }
        "404": { description: Artefacto inexistente }
  /api/v1/organizations/{organizationId}/monitored-companies/{companyId}/adn/failures:
    get:
      summary: Falhas abertas
      responses:
        "200": { description: OK }
  /api/v1/organizations/{organizationId}/monitored-companies/{companyId}/adn/failures/retry-bulk:
    post:
      summary: Reprocessamento em lote (máx. 50)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [failureIds]
              properties:
                failureIds:
                  type: array
                  maxItems: 50
                  items: { type: string, format: uuid }
      responses:
        "202": { description: Aceite (MVP) }
        "400": { description: ADN_INVALID_BULK_RETRY }
components:
  parameters:
    organizationId:
      name: organizationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    companyId:
      name: companyId
      in: path
      required: true
      schema: { type: string, format: uuid }
