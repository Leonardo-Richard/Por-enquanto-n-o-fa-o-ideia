openapi: 3.0.3
info:
  title: Portal NF — API v1 (organizações e sessão)
  version: 0.1.0
  description: |
    Contrato parcial (ORG-04 / ORG-03). Rotas sob `/api/v1/` com prefixo de deploy real conforme `apps/web`.

servers:
  - url: http://localhost:3000/api/v1
    description: Desenvolvimento local

paths:
  /organizations:
    post:
      summary: Criar organização (superadmin)
      description: Requer sessão autenticada com `isSuperadmin`.
      parameters:
        - in: header
          name: X-Organization-Create-Source
          schema:
            type: string
            enum: [admin_ui, api]
          description: Opcional; `admin_ui` quando a origem é a UI administrativa.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1 }
                tradeName: { type: string, nullable: true }
                taxIdDigits: { type: string, nullable: true, description: "14 dígitos quando informado" }
      responses:
        "201":
          description: Organização criada
          content:
            application/json:
              schema:
                type: object
                required: [id, name, tradeName, taxIdMasked, createdAt, localAdminLinked]
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string }
                  tradeName: { type: string, nullable: true }
                  taxIdMasked: { type: string, nullable: true }
                  createdAt: { type: string, format: date-time }
                  localAdminLinked: { type: boolean }
        "400": { description: Validação }
        "401": { description: Não autenticado }
        "403": { description: Sem superadmin }
        "409": { description: CNPJ duplicado }
        "500": { description: Erro interno }

  /organizations/accessible:
    get:
      summary: Organizações acessíveis ao utilizador
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: Lista paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        name: { type: string }
                        canOpenOrgAdmin: { type: boolean }
                        canManageUsers: { type: boolean }

  /organizations/{organizationId}/members:
    get:
      summary: Membros da organização (superadmin)
      description: |
        Paginação `page` (≥1, default 50), `pageSize` (1–100, default 50), `q` opcional.
        Com `q` presente aplica-se NFR31 (rate limit no servidor — ver implementação).
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembersListResponse"
        "400": { description: organizationId ou query inválidos }
        "401": { description: Não autenticado }
        "403": { description: Sem superadmin }
        "404": { description: Organização inexistente }
        "429": { description: Rate limit (pesquisa com `q`) }

    post:
      summary: Adicionar membro — modo `link` ou `create` (superadmin)
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [mode, email, orgRole]
                  properties:
                    mode: { const: link }
                    email: { type: string, format: email }
                    orgRole: { type: string, enum: [user, admin] }
                - type: object
                  required: [mode, email, password, name, orgRole]
                  properties:
                    mode: { const: create }
                    email: { type: string, format: email }
                    password: { type: string, minLength: 8, maxLength: 128 }
                    name: { type: string, minLength: 1, maxLength: 200 }
                    orgRole: { type: string, enum: [user, admin] }
                    jobTitle: { type: string, nullable: true }
                    department: { type: string, nullable: true }
                    phone: { type: string, nullable: true }
      responses:
        "201":
          description: Vínculo criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMemberItem"
        "400":
          description: Validação / USER_NOT_FOUND (corpo com `code`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembersApiError"
        "401": { description: Não autenticado }
        "403": { description: Sem superadmin }
        "404": { description: Organização inexistente }
        "409":
          description: MEMBERSHIP_DUPLICATE ou USER_EMAIL_CONFLICT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembersApiError"

  /organizations/{organizationId}/members/{membershipId}:
    patch:
      summary: Atualizar membro da organização (superadmin)
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: membershipId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orgRole: { type: string, enum: [user, admin] }
                jobTitle: { type: string, nullable: true }
                department: { type: string, nullable: true }
                phone: { type: string, nullable: true }
      responses:
        "200":
          description: Item actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMemberItem"
        "400": { description: Corpo inválido }
        "401": { description: Não autenticado }
        "403": { description: Sem superadmin }
        "404": { description: Organização ou vínculo inexistente }
        "409":
          description: LAST_ORG_ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembersApiError"
    delete:
      summary: Remover vínculo membro–organização (superadmin)
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: membershipId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Removido (sem corpo) }
        "401": { description: Não autenticado }
        "403": { description: Sem superadmin }
        "404": { description: Organização ou vínculo inexistente }
        "409":
          description: LAST_ORG_ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembersApiError"

  /organizations/{organizationId}/monitored-companies:
    get:
      summary: Empresas monitoradas no âmbito da organização
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: OK }
        "403": { description: Isolamento multi-tenant }

  /session/active-organization:
    post:
      summary: Definir organização ativa na sessão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizationId]
              properties:
                organizationId: { type: string, format: uuid }
      responses:
        "204": { description: Sem corpo }
        "403": { description: Sem membership na org }

  /session/active-company:
    post:
      summary: Definir empresa ativa (legado ORG-03)
      deprecated: true
      description: |
        Preferir `POST /session/active-organization`. Este endpoint mantém `activeCompanyId`
        e **obriga** `activeOrganizationId = companies.organization_id` da empresa (sem 410 no MVP).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyId]
              properties:
                companyId: { type: string, format: uuid }
      responses:
        "200":
          description: OK
        "403": { description: Sem acesso à empresa/org }

components:
  schemas:
    OrganizationMemberItem:
      type: object
      required:
        [membershipId, userId, email, displayName, orgRole, jobTitle, department, phone, createdAt, updatedAt]
      properties:
        membershipId: { type: string, format: uuid }
        userId: { type: string }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        orgRole: { type: string, enum: [user, admin] }
        jobTitle: { type: string, nullable: true }
        department: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OrganizationMembersListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMemberItem"
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }

    OrganizationMembersApiError:
      type: object
      required: [error]
      properties:
        error: { type: string, description: Mensagem humana (PT) }
        message: { type: string, description: Duplicado de `error` para compatibilidade }
        code:
          type: string
          enum:
            - LAST_ORG_ADMIN
            - MEMBERSHIP_DUPLICATE
            - USER_NOT_FOUND
            - USER_EMAIL_CONFLICT
